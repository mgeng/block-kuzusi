<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブロック崩し</title>
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    #canvas {
      border: 2px solid var(--accent);
      border-radius: 4px;
      display: block;
      cursor: none;
      touch-action: none;
      max-width: 100%;
      height: auto;
    }
    #hud {
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: var(--accent2);
    }
    #message {
      font-size: 1.1rem;
      color: var(--accent);
      min-height: 1.5rem;
      text-align: center;
    }
    .controls { font-size: 0.8rem; color: var(--muted); text-align: center; }
    #mute-btn {
      position: fixed;
      top: 0.75rem;
      right: 1rem;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 10;
    }
    #mute-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ---- ギャラリー ---- */
    #gallery {
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 18, 0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      z-index: 200;
      padding: 1.5rem;
      animation: gFadeIn 0.45s ease;
    }
    #gallery.hidden { display: none; }
    @keyframes gFadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    #gallery-title {
      font-size: 1.7rem;
      font-weight: bold;
      color: #ffd54f;
      text-shadow: 0 0 24px rgba(255,109,0,0.9);
      text-align: center;
      letter-spacing: 0.05em;
    }
    #gallery-img {
      max-width: min(420px, 90vw);
      max-height: 62vh;
      object-fit: contain;
      border: 2px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 0 40px rgba(224,64,251,0.55), 0 0 80px rgba(224,64,251,0.2);
      animation: gImgIn 0.5s ease 0.1s both;
    }
    @keyframes gImgIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #gallery-btn {
      animation: gBtnIn 0.4s ease 0.3s both;
    }
    @keyframes gBtnIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <a href="../">← ゲーム一覧</a>
    <h1>ブロック崩し</h1>
  </header>

  <main>
    <div id="game-area">
      <div id="hud">
        <span>スコア: <b id="score">0</b></span>
        <span>残機: <b id="lives">3</b></span>
        <span>Lv: <b id="level">1</b></span>
      </div>
      <canvas id="canvas" width="360" height="640"></canvas>
      <div id="message">クリックまたはタップでスタート</div>
      <div class="controls">マウス / タッチでパドルを動かす</div>
    </div>
  </main>

  <!-- ギャラリーオーバーレイ -->
  <div id="gallery" class="hidden">
    <div id="gallery-title"></div>
    <img id="gallery-img" src="" alt="クリア画像">
    <button id="gallery-btn" class="btn">次のレベルへ</button>
  </div>

  <button id="mute-btn" title="BGM ON/OFF">🔊</button>

  <script src="../assets/js/bgm.js"></script>
  <script>bgm.setSrc('../assets/bgm/block-kuzushi.mp3');</script>
  <script src="game.js"></script>
</body>
</html>
