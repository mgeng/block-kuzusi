<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ゲームタイトル</title>
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    /* ゲーム固有スタイルをここに書く */
    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    #score { font-size: 1.2rem; color: var(--accent2); }
  </style>
</head>
<body>
  <header>
    <a href="../">← ゲーム一覧</a>
    <h1>ゲームタイトル</h1>
  </header>

  <main>
    <div id="game-area">
      <div id="score">スコア: 0</div>
      <!-- ゲーム本体をここに -->
    </div>
  </main>

  <!-- ご褒美モーダル -->
  <div id="reward-modal" class="hidden">
    <p>クリア！</p>
    <img id="reward-img" src="" alt="ご褒美">
    <button class="btn" onclick="document.getElementById('reward-modal').classList.add('hidden')">閉じる</button>
  </div>

  <script>
    // ご褒美を表示する関数（game.js から呼ぶ）
    function showReward(imagePath, message = 'クリア！') {
      document.querySelector('#reward-modal p').textContent = message;
      document.getElementById('reward-img').src = imagePath;
      document.getElementById('reward-modal').classList.remove('hidden');
    }
  </script>
  <script src="../assets/js/bgm.js"></script>
  <script src="game.js"></script>
</body>
</html>
