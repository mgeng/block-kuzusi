<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブロック崩し</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <style>
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,45,149,0.05), transparent 18%, transparent 82%, rgba(25,246,255,0.05)),
        radial-gradient(circle at center, transparent 58%, rgba(0,0,0,0.34));
      mix-blend-mode: screen;
      z-index: 300;
    }

    .marquee {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      min-width: min(100%, 34rem);
      padding: 0.55rem 1rem;
      border: 3px solid #080812;
      background: linear-gradient(180deg, #372052, #181828 54%, #0b0b14);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08), 0 0 22px rgba(255,45,149,0.45);
    }

    .marquee-light {
      width: 0.72rem;
      aspect-ratio: 1;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--coin);
      box-shadow: 0 0 12px var(--coin), 0 0 24px var(--accent);
    }

    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      width: min(100%, 36rem);
      margin-inline: auto;
      padding: clamp(0.8rem, 3vw, 1.25rem);
      border: 8px solid #090912;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 18%),
        linear-gradient(180deg, #2d2d40, #11111b);
      box-shadow:
        inset 0 0 0 3px #474766,
        inset 0 0 0 6px #0d0d16,
        0 14px 0 #05050a,
        0 26px 38px rgba(0,0,0,0.62);
    }

    .screen-shell {
      position: relative;
      width: min(100%, 390px);
      padding: 14px;
      border: 4px solid #050509;
      border-radius: 8px;
      background: linear-gradient(180deg, #090912, #1b1b27);
      box-shadow: inset 0 0 24px rgba(25,246,255,0.15), 0 0 24px rgba(0,0,0,0.7);
    }

    .screen-shell::before {
      content: "";
      position: absolute;
      inset: 14px;
      pointer-events: none;
      background: linear-gradient(rgba(255,255,255,0.07) 50%, rgba(0,0,0,0.12) 50%);
      background-size: 100% 4px;
      z-index: 2;
      opacity: 0.55;
    }

    #canvas {
      border: 3px solid #2ff8ff;
      border-radius: 3px;
      display: block;
      cursor: none;
      touch-action: none;
      max-width: 100%;
      height: auto;
      background: #050511;
      box-shadow: 0 0 0 3px #111, 0 0 22px rgba(25,246,255,0.55);
      image-rendering: pixelated;
    }

    #hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(4.6rem, 1fr));
      gap: 0.5rem;
      width: 100%;
      font-family: "Courier New", monospace;
      font-size: clamp(0.72rem, 2.3vw, 0.95rem);
      color: var(--coin);
      text-shadow: 0 0 10px rgba(255,211,77,0.8);
    }

    #hud span {
      min-height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem;
      border: 2px solid #050509;
      background: #070711;
      box-shadow: inset 0 0 12px rgba(255,45,149,0.25);
      text-align: center;
      white-space: nowrap;
    }

    #message {
      width: 100%;
      min-height: 2.25rem;
      padding: 0.45rem 0.75rem;
      border: 2px solid #070711;
      background: #11111d;
      color: var(--accent2);
      font-size: clamp(0.86rem, 2.5vw, 1.05rem);
      text-align: center;
      text-shadow: 0 0 12px rgba(25,246,255,0.75);
    }

    .controls {
      font-family: "Courier New", monospace;
      font-size: clamp(0.68rem, 2.2vw, 0.8rem);
      color: var(--muted);
      text-align: center;
      text-transform: none;
    }

    #touch-controls {
      display: none;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: 0.6rem;
      width: 100%;
    }

    .touch-btn {
      min-height: 3.25rem;
      border: 2px solid var(--accent2);
      border-radius: 8px;
      background: linear-gradient(#252540, #0a0a14);
      color: var(--accent2);
      font: 900 1.05rem "Trebuchet MS", system-ui, sans-serif;
      box-shadow: 0 4px 0 #050509, inset 0 0 14px rgba(25,246,255,0.12);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .touch-btn.action {
      border-color: var(--coin);
      color: #120a00;
      background: linear-gradient(#fff27c, #ff9d25 52%, #b01832);
    }

    .touch-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #050509;
    }

    #route-select {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .route-btn {
      min-width: 5.2rem;
      padding: 0.5rem 0.65rem;
      border: 2px solid #050509;
      border-radius: 4px;
      background: linear-gradient(#303048, #11111c);
      color: var(--muted);
      cursor: pointer;
      font: 900 0.78rem "Trebuchet MS", system-ui, sans-serif;
      box-shadow: 0 4px 0 #050509;
    }

    .route-btn.active {
      border-color: #ffd34d;
      background: linear-gradient(#fff27c, #ff9d25 50%, #ff4b2f 51%, #b01832);
      color: #09080f;
      box-shadow: 0 4px 0 #4d0710, 0 0 18px rgba(255,45,149,0.6);
    }

    .route-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .route-btn.active:hover { color: #09080f; }

    #mute-btn {
      position: fixed;
      top: 0.75rem;
      right: 1rem;
      z-index: 10;
      padding: 0.25rem 0.6rem;
      border: 2px solid var(--accent2);
      border-radius: 4px;
      background: #10101b;
      color: var(--accent2);
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(25,246,255,0.35);
    }

    #mute-btn:hover { border-color: var(--coin); color: var(--coin); }

    #gallery {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      z-index: 200;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      background:
        linear-gradient(rgba(255,255,255,0.035) 50%, rgba(0,0,0,0.11) 50%),
        rgba(4, 4, 18, 0.96);
      background-size: 100% 4px, auto;
      animation: gFadeIn 0.45s ease;
    }

    #gallery.hidden { display: none; }

    @keyframes gFadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    #gallery-title {
      color: #ffd54f;
      font-size: clamp(1.35rem, 7vw, 2.7rem);
      font-weight: bold;
      text-align: center;
      text-shadow: 4px 4px 0 #000, 0 0 24px rgba(255,109,0,0.9);
    }

    #gallery-img {
      width: auto;
      max-width: min(420px, 92vw);
      max-height: min(68dvh, 760px);
      aspect-ratio: 2 / 3;
      object-fit: contain;
      border: 6px solid #080812;
      border-radius: 6px;
      box-shadow: 0 0 0 3px var(--accent2), 0 0 40px rgba(255,45,149,0.55), 0 0 80px rgba(25,246,255,0.2);
      animation: gImgIn 0.5s ease 0.1s both;
    }

    @keyframes gImgIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #gallery-btn { animation: gBtnIn 0.4s ease 0.3s both; }

    @keyframes gBtnIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      body { min-height: 100dvh; }
      header { padding: 0.35rem 0.5rem; }
      h1 { font-size: clamp(1.2rem, 7vw, 1.8rem); }
      .marquee { min-width: 0; padding: 0.35rem 0.55rem; }
      main { padding: 0.75rem 0.45rem max(0.8rem, env(safe-area-inset-bottom)); }
      #game-area {
        gap: 0.5rem;
        padding: 0.55rem;
        border-width: 4px;
        box-shadow: inset 0 0 0 2px #474766, inset 0 0 0 4px #0d0d16, 0 8px 0 #05050a;
      }
      #hud {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.25rem;
        font-size: clamp(0.61rem, 2.7vw, 0.76rem);
      }
      #hud span { min-height: 1.75rem; padding: 0.2rem 0.1rem; }
      #route-select { gap: 0.3rem; }
      .route-btn { min-width: 0; flex: 1; padding: 0.4rem 0.25rem; font-size: 0.7rem; }
      .screen-shell {
        width: auto;
        height: min(55dvh, 640px);
        aspect-ratio: 9 / 16;
        padding: 7px;
      }
      .screen-shell::before { inset: 9px; }
      #canvas { width: 100%; height: 100%; }
      #message { min-height: 1.8rem; padding: 0.3rem; font-size: 0.78rem; }
      .controls { display: none; }
      #touch-controls { display: grid; }
      #mute-btn {
        top: max(0.35rem, env(safe-area-inset-top));
        right: max(0.4rem, env(safe-area-inset-right));
        font-size: 0.9rem;
      }
      #gallery { gap: 0.75rem; }
      #gallery-title { font-size: clamp(1.15rem, 6vw, 1.7rem); }
      #gallery-img { max-height: 70dvh; max-width: 88vw; }
      #gallery-btn { min-height: 3rem; }
    }

    @media (max-width: 380px), (max-height: 700px) {
      header { display: none; }
      main { padding-top: 0.35rem; }
      .screen-shell { height: min(58dvh, 560px); }
      .touch-btn { min-height: 2.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="marquee" aria-label="ブロック崩し">
      <span class="marquee-light"></span>
      <h1>ブロック崩し</h1>
      <span class="marquee-light"></span>
    </div>
  </header>

  <main>
    <div id="game-area">
      <div id="hud">
        <span>スコア: <b id="score">0</b></span>
        <span>残機: <b id="lives">5</b></span>
        <span>Lv: <b id="level">1</b></span>
        <span>Root: <b id="mode">N root</b></span>
      </div>
      <div id="route-select" aria-label="ルート選択">
        <button class="route-btn" data-mode="p" type="button">P root</button>
        <button class="route-btn active" data-mode="n" type="button">N root</button>
        <button class="route-btn" data-mode="g" type="button">G root</button>
      </div>
      <div class="screen-shell">
        <canvas id="canvas" width="360" height="640"></canvas>
      </div>
      <div id="message">クリックまたはタップでスタート</div>
      <div id="touch-controls" aria-label="タッチ操作">
        <button id="touch-left" class="touch-btn" type="button" aria-label="左へ移動">◀ 左</button>
        <button id="touch-action" class="touch-btn action" type="button">発射</button>
        <button id="touch-right" class="touch-btn" type="button" aria-label="右へ移動">右 ▶</button>
      </div>
      <div class="controls">マウス / タッチ / ←→ / h l で移動、Space でスタート</div>
    </div>
  </main>

  <!-- ギャラリーオーバーレイ -->
  <div id="gallery" class="hidden">
    <div id="gallery-title"></div>
    <img id="gallery-img" src="" alt="クリア画像">
    <button id="gallery-btn" class="btn">次のレベルへ</button>
  </div>

  <button id="mute-btn" title="BGM ON/OFF">🔊</button>

  <script src="assets/js/bgm.js"></script>
  <script src="game.js"></script>
</body>
</html>
