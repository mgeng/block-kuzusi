<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブロック崩し</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <style>
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .game-card {
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .game-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .game-card .title { font-size: 1.1rem; font-weight: bold; color: var(--accent2); }
    .game-card .desc { font-size: 0.85rem; color: var(--muted); }
    .tag {
      font-size: 0.75rem;
      background: #2a2a40;
      color: var(--accent);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      width: fit-content;
    }
    .hero { text-align: center; padding: 3rem 0 1rem; }
    .hero h2 { font-size: 1rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>ブロック崩し</h1>
  </header>

  <main>
    <div class="hero">
      <h2>クリアするとご褒美画像が見られる、ブロック崩しゲーム</h2>
    </div>

    <div class="game-grid">

      <a class="game-card" href="block-kuzushi/">
        <span class="tag">アクション</span>
        <span class="title">ブロック崩し</span>
        <span class="desc">全ブロックを壊してクリア！</span>
      </a>
    </div>
  </main>
</body>
</html>
